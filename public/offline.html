<!DOCTYPE html>
<html lang="en" style="background:#ffffff;color-scheme:light;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <meta name="color-scheme" content="light" />
  <title>You're offline — VendoorX</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { color-scheme: light; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff !important;
      color: #0a0a0a !important;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Top nav — white with green wordmark */
    .nav {
      padding: 14px 20px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #0a0a0a;
      text-decoration: none;
    }
    .logo span { color: #16a34a; }

    /* Green top accent strip */
    .accent-strip {
      height: 4px;
      background: linear-gradient(90deg, #16a34a 0%, #22c55e 60%, #bbf7d0 100%);
    }

    /* Main centred area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 24px;
      text-align: center;
    }

    /* Icon container — green tinted */
    .icon-wrap {
      position: relative;
      margin-bottom: 28px;
    }
    .icon-card {
      width: 108px;
      height: 108px;
      border-radius: 28px;
      background: #f0fdf4;
      border: 2px solid #bbf7d0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(22,163,74,0.12);
    }
    .badge {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ef4444;
      border: 3px solid #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
    }

    /* Heading */
    h1 {
      font-size: 1.85rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #0a0a0a;
      margin-bottom: 10px;
      line-height: 1.1;
    }
    .desc {
      color: #6b7280;
      font-size: 0.9rem;
      line-height: 1.65;
      max-width: 270px;
      margin-bottom: 28px;
    }

    /* Status pill — green when online */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 700;
      background: #f0fdf4;
      color: #15803d;
      border: 1.5px solid #bbf7d0;
      margin-bottom: 32px;
      transition: all 0.3s ease;
    }
    .pill.offline {
      background: #fafafa;
      color: #6b7280;
      border-color: #e5e7eb;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #16a34a;
    }
    .dot.pulse { animation: pulse 1.4s ease-in-out infinite; background: #9ca3af; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.3); }
    }

    /* Buttons */
    .btns {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 300px;
    }
    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 15px 20px;
      border-radius: 16px;
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.12s, opacity 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); opacity: 0.85; }

    /* Primary = solid green */
    .btn-primary {
      background: #16a34a;
      color: #ffffff;
      box-shadow: 0 4px 16px rgba(22,163,74,0.3);
    }
    .btn-primary:hover { background: #15803d; }

    /* Secondary = white outlined */
    .btn-secondary {
      background: #ffffff;
      color: #0a0a0a;
      border: 1.5px solid #e5e7eb;
    }
    .btn-secondary:hover { background: #f9fafb; }

    /* Success check bubble */
    .check-bubble {
      display: none;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #f0fdf4;
      border: 2px solid #bbf7d0;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    /* Footer tip */
    .tip {
      padding: 24px 24px 44px;
      text-align: center;
      font-size: 0.73rem;
      color: #9ca3af;
      line-height: 1.6;
    }
    .tip strong { color: #16a34a; font-weight: 700; }

    /* Online state transitions */
    body.is-online .icon-wrap  { display: none; }
    body.is-online .check-bubble { display: flex; }
    body.is-online .offline-h  { display: none; }
    body.is-online .online-h   { display: block; }
    body.is-online .offline-d  { display: none; }
    body.is-online .online-d   { display: block; }
    body.is-online .btns       { display: none; }
    body.is-online .tip        { display: none; }

    .online-h, .online-d { display: none; }
  </style>
</head>
<body>
  <!-- Green accent top strip -->
  <div class="accent-strip"></div>

  <!-- Nav -->
  <div class="nav">
    <a href="/" class="logo">Vendoor<span>X</span></a>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Offline icon (green-tinted card) -->
    <div class="icon-wrap">
      <div class="icon-card">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
             stroke="#16a34a" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
      </div>
      <div class="badge">!</div>
    </div>

    <!-- Online success bubble -->
    <div class="check-bubble">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
           stroke="#16a34a" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
    </div>

    <h1 class="offline-h">You're offline</h1>
    <h1 class="online-h">Back online!</h1>

    <p class="desc offline-d">
      Check your data or Wi-Fi and try again.<br>
      Pages you've visited before are still available.
    </p>
    <p class="desc online-d">
      Connection restored. Taking you back now…
    </p>

    <!-- Status pill -->
    <div class="pill offline" id="pill">
      <span class="dot pulse" id="dot"></span>
      <span id="pill-text">Waiting for connection</span>
    </div>

    <!-- Buttons -->
    <div class="btns">
      <button class="btn btn-primary" onclick="window.location.reload()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Try Again
      </button>
      <a href="/" class="btn btn-secondary">Go Home</a>
    </div>
  </div>

  <p class="tip">
    <strong>Tip:</strong> Pages you've already visited can still be viewed while offline.
  </p>

  <script>
    var dots = 0;
    var pillEl   = document.getElementById('pill');
    var dotEl    = document.getElementById('dot');
    var pillText = document.getElementById('pill-text');

    // Animate waiting dots
    var timer = setInterval(function () {
      if (document.body.classList.contains('is-online')) return;
      dots = (dots % 3) + 1;
      pillText.textContent = 'Waiting for connection' + '.'.repeat(dots);
    }, 600);

    function goOnline() {
      clearInterval(timer);
      document.body.classList.add('is-online');
      pillEl.classList.remove('offline');
      dotEl.classList.remove('pulse');
      pillText.textContent = 'Connected — redirecting';
      setTimeout(function () { window.location.href = '/'; }, 1500);
    }

    window.addEventListener('online', goOnline);

    // Already online → redirect immediately
    if (navigator.onLine) {
      setTimeout(function () { window.location.href = '/'; }, 600);
    }
  </script>
</body>
</html>
