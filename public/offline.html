<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>You're offline — VendoorX</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #16a34a;
      --bg: #f8f9fa;
      --card: #ffffff;
      --text: #0a0a0a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --red: #ef4444;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --card: #111111;
        --text: #f9fafb;
        --muted: #9ca3af;
        --border: #1f2937;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Nav */
    .nav {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      display: flex;
      align-items: center;
    }
    .logo {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--primary); }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    /* Icon card */
    .icon-wrap {
      position: relative;
      margin-bottom: 28px;
    }
    .icon-card {
      width: 112px;
      height: 112px;
      border-radius: 28px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-card svg { color: #d1d5db; }
    .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--red);
      border: 3px solid var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
    }

    /* Text */
    h1 {
      font-size: 1.875rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.1;
    }
    .desc {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.65;
      max-width: 280px;
      margin-bottom: 28px;
    }

    /* Status pill */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 700;
      background: #f3f4f6;
      color: var(--muted);
      border: 1px solid var(--border);
      margin-bottom: 32px;
      transition: all 0.3s ease;
    }
    .pill.online {
      background: rgba(22,163,74,0.1);
      color: var(--primary);
      border-color: rgba(22,163,74,0.25);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot.online { background: var(--primary); animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* Buttons */
    .btns {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 300px;
    }
    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border-radius: 16px;
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.12s, opacity 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); opacity: 0.85; }
    .btn-primary {
      background: var(--text);
      color: var(--bg);
    }
    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    @media (prefers-color-scheme: dark) {
      .btn-primary { background: #f9fafb; color: #0a0a0a; }
    }

    /* Footer tip */
    .tip {
      padding: 20px 24px 40px;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 1.6;
    }

    /* Success state */
    .success-check {
      display: none;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(22,163,74,0.12);
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    body.is-online .icon-wrap { display: none; }
    body.is-online .success-check { display: flex; }
    body.is-online h1::before { content: ""; }
    body.is-online .main-title { display: none; }
    body.is-online .online-title { display: block; }
    body.is-online .main-desc { display: none; }
    body.is-online .online-desc { display: block; }
    body.is-online .btns { display: none; }

    .online-title, .online-desc { display: none; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/" class="logo">Vendoor<span>X</span></a>
  </div>

  <div class="main">
    <!-- Offline icon -->
    <div class="icon-wrap">
      <div class="icon-card">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
      </div>
      <div class="badge">!</div>
    </div>

    <!-- Online success icon -->
    <div class="success-check">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
    </div>

    <h1 class="main-title">You're offline</h1>
    <h1 class="online-title">Back online!</h1>

    <p class="desc main-desc">Check your data or Wi-Fi connection and try again. Pages you've visited before are still available.</p>
    <p class="desc online-desc">Connection restored. Taking you back now…</p>

    <!-- Status pill -->
    <div class="pill" id="pill">
      <span class="dot" id="dot"></span>
      <span id="pill-text">Waiting for connection</span>
    </div>

    <!-- Buttons -->
    <div class="btns">
      <button class="btn btn-primary" onclick="window.location.reload()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Try Again
      </button>
      <a href="/" class="btn btn-secondary">Go Home</a>
    </div>
  </div>

  <p class="tip">
    Pages you've already visited can still be<br>viewed while you're offline.
  </p>

  <script>
    var dots = 0;
    var pillText = document.getElementById('pill-text');
    var pill = document.getElementById('pill');
    var dotEl = document.getElementById('dot');

    // Animate the waiting dots
    setInterval(function() {
      if (document.body.classList.contains('is-online')) return;
      dots = (dots % 3) + 1;
      pillText.textContent = 'Waiting for connection' + '.'.repeat(dots);
    }, 600);

    function goOnline() {
      document.body.classList.add('is-online');
      pill.classList.add('online');
      dotEl.classList.add('online');
      pillText.textContent = 'Connected — redirecting';
      setTimeout(function() { window.location.href = '/'; }, 1500);
    }

    window.addEventListener('online', goOnline);

    // If already online when this page loads, redirect immediately
    if (navigator.onLine) {
      setTimeout(function() { window.location.href = '/'; }, 800);
    }
  </script>
</body>
</html>
