<!DOCTYPE html>
<html lang="en" style="background:#ffffff;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light only" />
  <meta name="robots" content="noindex" />
  <title>You're offline — VendoorX</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { color-scheme: light only; }

    html, body {
      background: #ffffff !important;
      color: #0f172a !important;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top bar ── */
    .topbar {
      height: 3px;
      background: linear-gradient(90deg, #16a34a 0%, #22c55e 50%, #4ade80 100%);
      flex-shrink: 0;
    }

    /* ── Nav ── */
    .nav {
      padding: 16px 24px;
      background: #ffffff;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .wordmark {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: #0f172a;
      text-decoration: none;
      line-height: 1;
    }
    .wordmark em { color: #16a34a; font-style: normal; }

    /* ── Main content ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 32px;
      text-align: center;
    }

    /* ── Icon ── */
    .icon-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #f0fdf4;
      border: 2px solid #bbf7d0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      position: relative;
      animation: float 3s ease-in-out infinite;
    }
    .icon-ring svg { color: #16a34a; }

    .icon-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #ef4444;
      border: 2.5px solid #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    /* ── Text ── */
    h1 {
      font-size: clamp(1.6rem, 5vw, 2rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #0f172a;
      margin-bottom: 12px;
      line-height: 1.1;
    }

    .desc {
      font-size: 0.95rem;
      color: #64748b;
      line-height: 1.7;
      max-width: 300px;
      margin-bottom: 36px;
    }

    /* ── Status pill ── */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      background: #f8fafc;
      color: #64748b;
      border: 1.5px solid #e2e8f0;
      margin-bottom: 36px;
      letter-spacing: 0.01em;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #94a3b8;
      animation: blink 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }

    /* ── Buttons ── */
    .btns {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 320px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 120px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #16a34a;
      color: #ffffff;
      box-shadow: 0 4px 14px rgba(22, 163, 74, 0.35);
    }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(22, 163, 74, 0.45); }

    .btn-secondary {
      background: #ffffff;
      color: #0f172a;
      border: 1.5px solid #e2e8f0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    .btn-secondary:hover { background: #f8fafc; }

    /* ── Footer tip ── */
    .tip {
      margin-top: 48px;
      font-size: 0.78rem;
      color: #94a3b8;
      max-width: 280px;
      line-height: 1.6;
      padding-bottom: 24px;
    }
    .tip strong { color: #16a34a; }

    /* ── Responsive ── */
    @media (max-width: 380px) {
      .btns { flex-direction: column; }
      .btn { min-width: unset; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="topbar"></div>

  <nav class="nav">
    <a href="/" class="wordmark">Vendoor<em>X</em></a>
  </nav>

  <main class="main">
    <div class="icon-ring">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
      <span class="icon-badge">!</span>
    </div>

    <h1>You're offline</h1>
    <p class="desc">
      Check your Wi-Fi or mobile data and try again. Pages you've already visited are still available.
    </p>

    <div class="pill" id="pill">
      <span class="dot" id="dot"></span>
      <span id="pill-text">Waiting for connection</span>
    </div>

    <div class="btns">
      <button class="btn btn-primary" onclick="window.location.reload()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Try Again
      </button>
      <a href="/" class="btn btn-secondary">Go Home</a>
    </div>
  </main>

  <p class="tip">
    <strong>Tip:</strong> Pages you've already visited can still be viewed while offline.
  </p>

  <script>
    var dots = 0;
    var timer = setInterval(function () {
      dots = (dots % 3) + 1;
      var el = document.getElementById('pill-text');
      if (el) el.textContent = 'Waiting for connection' + '.'.repeat(dots);
    }, 600);

    window.addEventListener('online', function () {
      clearInterval(timer);
      var pill = document.getElementById('pill');
      var dot  = document.getElementById('dot');
      var text = document.getElementById('pill-text');
      if (pill) { pill.style.background='#f0fdf4'; pill.style.borderColor='#bbf7d0'; pill.style.color='#15803d'; }
      if (dot)  { dot.style.background='#16a34a'; dot.style.animation='none'; }
      if (text) text.textContent = 'Connected — redirecting';
      setTimeout(function () { window.location.href = '/'; }, 1200);
    });

    if (navigator.onLine) {
      setTimeout(function () { window.location.href = '/'; }, 400);
    }
  </script>
</body>
</html>
