name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm ci

      - name: Create static export fallback (required by Capacitor webDir)
        run: mkdir -p out && echo '<!DOCTYPE html><html><body>Loading VendoorX...</body></html>' > out/index.html

      - name: Initialize Android project (if not present)
        run: |
          if [ ! -d "android" ]; then
            echo "android/ not found — running cap add android"
            npx cap add android
          else
            echo "android/ already exists — skipping cap add"
          fi

      - name: Sync Capacitor with Android
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vendoorx-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Comment APK download link on commit
        if: github.event_name == 'push'
        run: |
          echo "✅ Android APK built successfully!"
          echo "Download from the Actions tab → vendoorx-debug-${{ github.sha }}"
