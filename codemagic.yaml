workflows:
  android-debug:
    name: VendoorX Android Debug APK
    max_build_duration: 60
    environment:
      node: 22.0.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Create Capacitor webDir fallback
        script: mkdir -p out && echo '<!DOCTYPE html><html><body>Loading VendoorX...</body></html>' > out/index.html

      - name: Add Android platform (if missing)
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Build debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
